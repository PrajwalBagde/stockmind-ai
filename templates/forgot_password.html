{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container auth-container-sm">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon reset-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h2>Reset Password</h2>
                <p>Enter your email and set a new password</p>
            </div>
            <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form" id="reset-form">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Registered Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="new_password"><i class="fas fa-lock"></i> New Password</label>
                    <div class="password-input">
                        <input type="password" id="new_password" name="new_password" placeholder="Min 6 characters" minlength="6" required>
                        <button type="button" class="toggle-pw" onclick="togglePassword('new_password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-lock"></i> Confirm New Password</label>
                    <div class="password-input">
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required>
                        <button type="button" class="toggle-pw" onclick="togglePassword('confirm_password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-key"></i> Reset Password
                </button>
            </form>
            <div class="auth-footer">
                <p>Remember your password? <a href="{{ url_for('login') }}">Sign In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
    else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
}
document.getElementById('reset-form')?.addEventListener('submit', function(e) {
    const pw = document.getElementById('new_password').value;
    const cpw = document.getElementById('confirm_password').value;
    if (pw !== cpw) { e.preventDefault(); alert('Passwords do not match!'); }
});
</script>
{% endblock %}
